<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presenze Volontari</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #080c10;
      --surface: #0d1117;
      --surface2: #161b22;
      --accent: #00ff88;
      --accent2: #00cfff;
      --danger: #ff4d6d;
      --warn: #ffd166;
      --text: #e6edf3;
      --muted: #7d8590;
      --border: rgba(0, 255, 136, 0.15);
      --glow: 0 0 20px rgba(0, 255, 136, 0.3);
      --glow2: 0 0 20px rgba(0, 207, 255, 0.3);
      --radius: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow blobs */
    body::after {
      content: '';
      position: fixed;
      top: -30%;
      right: -20%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(0, 207, 255, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .ambient-blob {
      position: fixed;
      bottom: -20%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(0, 255, 136, 0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 20px 80px;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-top: 8px;
    }

    .logo-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .logo-tag {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: var(--glow);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.4);
        opacity: 0.6;
      }
    }

    /* TIME */
    .time-display {
      text-align: center;
      margin-bottom: 28px;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      position: relative;
      overflow: hidden;
    }

    .time-display::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .time {
      font-family: 'Space Mono', monospace;
      font-size: 42px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      letter-spacing: -1px;
    }

    .date {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* SCANNER */
    .scanner-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 24px;
      position: relative;
    }

    .scanner-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .scanner-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .scan-indicator {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .scan-indicator::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: var(--glow);
      animation: pulse 1s ease-in-out infinite;
    }

    .video-wrap {
      position: relative;
      aspect-ratio: 1 / 1;
      background: #000;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    canvas {
      display: none;
    }

    /* Scanner overlay */
    .scan-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .scan-frame {
      width: 65%;
      aspect-ratio: 1;
      position: relative;
    }

    .scan-frame::before,
    .scan-frame::after,
    .scan-frame span::before,
    .scan-frame span::after {
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: var(--accent);
      border-style: solid;
    }

    .scan-frame::before {
      top: 0;
      left: 0;
      border-width: 3px 0 0 3px;
    }

    .scan-frame::after {
      top: 0;
      right: 0;
      border-width: 3px 3px 0 0;
    }

    .scan-frame span::before {
      bottom: 0;
      left: 0;
      border-width: 0 0 3px 3px;
    }

    .scan-frame span::after {
      bottom: 0;
      right: 0;
      border-width: 0 3px 3px 0;
    }

    .scan-line {
      position: absolute;
      left: 10%;
      right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      box-shadow: 0 0 10px var(--accent);
      animation: scanline 2.5s ease-in-out infinite;
      top: 0;
    }

    @keyframes scanline {
      0% {
        top: 10%;
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        top: 90%;
        opacity: 0;
      }
    }

    /* TIPO SWITCH */
    .tipo-switch {
      display: flex;
      gap: 8px;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }

    .tipo-btn {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }

    .tipo-btn.active-entrata {
      background: rgba(0, 255, 136, 0.12);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: var(--glow);
    }

    .tipo-btn.active-uscita {
      background: rgba(255, 77, 109, 0.12);
      border-color: var(--danger);
      color: var(--danger);
      box-shadow: 0 0 20px rgba(255, 77, 109, 0.3);
    }

    /* FEEDBACK */
    .feedback {
      padding: 16px 20px;
      border-radius: var(--radius);
      margin-bottom: 20px;
      font-weight: 600;
      font-size: 14px;
      display: none;
      align-items: center;
      gap: 12px;
      animation: slideIn 0.3s ease;
      border: 1px solid;
    }

    .feedback.show {
      display: flex;
    }

    .feedback.success {
      background: rgba(0, 255, 136, 0.1);
      border-color: var(--accent);
      color: var(--accent);
    }

    .feedback.error {
      background: rgba(255, 77, 109, 0.1);
      border-color: var(--danger);
      color: var(--danger);
    }

    .feedback.loading {
      background: rgba(0, 207, 255, 0.1);
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .feedback-icon {
      font-size: 20px;
      flex-shrink: 0;
    }

    .feedback-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .feedback-name {
      font-size: 16px;
      font-weight: 800;
    }

    .feedback-sub {
      font-size: 11px;
      opacity: 0.7;
      font-family: 'Space Mono', monospace;
    }

    @keyframes slideIn {
      from {
        transform: translateY(-10px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* LOG */
    .log-section {
      margin-top: 8px;
    }

    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .log-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .log-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideIn 0.3s ease;
    }

    .log-badge {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .log-badge.entrata {
      background: var(--accent);
      box-shadow: var(--glow);
    }

    .log-badge.uscita {
      background: var(--danger);
      box-shadow: 0 0 8px rgba(255, 77, 109, 0.5);
    }

    .log-info {
      flex: 1;
    }

    .log-nome {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .log-meta {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }

    .log-tipo {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .log-tipo.entrata {
      color: var(--accent);
    }

    .log-tipo.uscita {
      color: var(--danger);
    }

    .log-empty {
      text-align: center;
      padding: 32px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
    }

    /* CAMERA BTN */
    .cam-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, rgba(0, 255, 136, 0.15), rgba(0, 207, 255, 0.15));
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.3s;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .cam-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(0, 207, 255, 0.2));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .cam-btn:hover::before {
      opacity: 1;
    }

    .cam-btn:hover {
      box-shadow: var(--glow);
      transform: translateY(-1px);
    }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
    }

    .stat-card.entrate::before {
      background: var(--accent);
    }

    .stat-card.uscite::before {
      background: var(--danger);
    }

    .stat-num {
      font-family: 'Space Mono', monospace;
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-card.entrate .stat-num {
      color: var(--accent);
    }

    .stat-card.uscite .stat-num {
      color: var(--danger);
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <div class="ambient-blob"></div>

  <main>
    <header>
      <div class="logo-group">
        <span class="logo-tag">// Servizio Civile</span>
        <h1>Presenze</h1>
      </div>
      <div class="status-dot" id="statusDot"></div>
    </header>

    <div class="time-display">
      <div class="time" id="clock">00:00:00</div>
      <div class="date" id="dateLabel">—</div>
    </div>

    <div class="stats-row">
      <div class="stat-card entrate">
        <div class="stat-num" id="statEntrate">0</div>
        <div class="stat-label">Entrate oggi</div>
      </div>
      <div class="stat-card uscite">
        <div class="stat-num" id="statUscite">0</div>
        <div class="stat-label">Uscite oggi</div>
      </div>
    </div>

    <div class="scanner-card">
      <div class="scanner-header">
        <span class="scanner-title">Scanner QR</span>
        <span class="scan-indicator" id="scanIndicator">IN ATTESA</span>
      </div>
      <div class="video-wrap">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
        <div class="scan-overlay">
          <div class="scan-frame">
            <span></span>
            <div class="scan-line"></div>
          </div>
        </div>
      </div>
      <div class="tipo-switch">
        <button class="tipo-btn active-entrata" id="btnEntrata" onclick="setTipo('entrata')">⬆️ Entrata</button>
        <button class="tipo-btn" id="btnUscita" onclick="setTipo('uscita')">⬇️ Uscita</button>
      </div>
    </div>

    <div class="feedback" id="feedback">
      <div class="feedback-icon" id="feedbackIcon">✓</div>
      <div class="feedback-text">
        <div class="feedback-name" id="feedbackName">—</div>
        <div class="feedback-sub" id="feedbackSub">—</div>
      </div>
    </div>

    <div class="log-section">
      <div class="section-label">Log di oggi</div>
      <div class="log-list" id="logList">
        <div class="log-empty">Nessuna scansione ancora</div>
      </div>
    </div>
  </main>

  <script>
    // ─── CONFIG ────────────────────────────────────────────────────────────────
    const SUPABASE_URL = 'https://czsbkfbtjlrbugmggzpn.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6c2JrZmJ0amxyYnVnbWdnenBuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MTY4MzEsImV4cCI6MjA4ODE5MjgzMX0.bAl9rSpvN2eAGSUhyBYg4aKvgnwPwrLP8fDiUkQ1grM';

    // ─── INIT ──────────────────────────────────────────────────────────────────
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    let tipoCorrente = 'entrata';
    let ultimoScan = null;
    let cooldown = false;
    const LOG_TODAY = [];

    // ─── CLOCK ─────────────────────────────────────────────────────────────────
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT');
      document.getElementById('dateLabel').textContent = now.toLocaleDateString('it-IT', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ─── TIPO ──────────────────────────────────────────────────────────────────
    function setTipo(tipo) {
      tipoCorrente = tipo;
      document.getElementById('btnEntrata').className = 'tipo-btn' + (tipo === 'entrata' ? ' active-entrata' : '');
      document.getElementById('btnUscita').className = 'tipo-btn' + (tipo === 'uscita' ? ' active-uscita' : '');
    }

    // ─── FEEDBACK ──────────────────────────────────────────────────────────────
    function showFeedback(type, icon, name, sub) {
      const el = document.getElementById('feedback');
      el.className = 'feedback show ' + type;
      document.getElementById('feedbackIcon').textContent = icon;
      document.getElementById('feedbackName').textContent = name;
      document.getElementById('feedbackSub').textContent = sub;
      setTimeout(() => el.classList.remove('show'), 4000);
    }

    // ─── STATS ─────────────────────────────────────────────────────────────────
    function updateStats() {
      const entrate = LOG_TODAY.filter(l => l.tipo === 'entrata').length;
      const uscite = LOG_TODAY.filter(l => l.tipo === 'uscita').length;
      document.getElementById('statEntrate').textContent = entrate;
      document.getElementById('statUscite').textContent = uscite;
    }

    // ─── LOG ───────────────────────────────────────────────────────────────────
    function addLogItem(nome, tipo, ts) {
      LOG_TODAY.unshift({ nome, tipo, ts });
      const list = document.getElementById('logList');
      list.innerHTML = '';
      LOG_TODAY.slice(0, 12).forEach(entry => {
        const t = new Date(entry.ts).toLocaleTimeString('it-IT');
        list.insertAdjacentHTML('beforeend', `
        <div class="log-item">
          <div class="log-badge ${entry.tipo}"></div>
          <div class="log-info">
            <div class="log-nome">${entry.nome}</div>
            <div class="log-meta">${t}</div>
          </div>
          <div class="log-tipo ${entry.tipo}">${entry.tipo}</div>
        </div>
      `);
      });
      updateStats();
    }

    // ─── QR SCAN ───────────────────────────────────────────────────────────────
    async function onQRDetected(code) {
      if (cooldown || code === ultimoScan) return;
      cooldown = true;
      ultimoScan = code;

      document.getElementById('scanIndicator').textContent = 'ELABORO...';
      showFeedback('loading', '⟳', 'Elaborazione...', code);

      try {
        // Cerca volontario per codice_qr
        const { data: vol, error: ve } = await db
          .from('volontari')
          .select('*')
          .eq('codice_qr', code)
          .single();

        if (ve || !vol) {
          showFeedback('error', '✗', 'QR non riconosciuto', code);
          document.getElementById('scanIndicator').textContent = 'ERRORE';
        } else {
          const ts = new Date().toISOString();
          const nome = `${vol.nome} ${vol.cognome}`;

          await db.from('presenze').insert({
            volontario_id: vol.id,
            tipo: tipoCorrente,
            timestamp: ts
          });

          const emoji = tipoCorrente === 'entrata' ? '✓' : '✗';
          showFeedback('success', emoji, nome,
            `${tipoCorrente.toUpperCase()} registrata · ${new Date(ts).toLocaleTimeString('it-IT')}`);

          addLogItem(nome, tipoCorrente, ts);
          document.getElementById('scanIndicator').textContent = 'SCANSIONE OK';
        }
      } catch (err) {
        showFeedback('error', '!', 'Errore di rete', err.message);
        document.getElementById('scanIndicator').textContent = 'ERRORE';
      }

      setTimeout(() => {
        cooldown = false;
        ultimoScan = null;
        document.getElementById('scanIndicator').textContent = 'ATTIVO';
      }, 3000);
    }

    // ─── CAMERA ────────────────────────────────────────────────────────────────
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 } }
        });
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        video.srcObject = stream;

        video.addEventListener('loadedmetadata', () => {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          document.getElementById('scanIndicator').textContent = 'ATTIVO';

          function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
              ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
              const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
              const code = jsQR(imgData.data, imgData.width, imgData.height, {
                inversionAttempts: 'dontInvert'
              });
              if (code) onQRDetected(code.data);
            }
            requestAnimationFrame(tick);
          }
          tick();
        });
      } catch (err) {
        document.getElementById('scanIndicator').textContent = 'CAM NEGATA';
        showFeedback('error', '!', 'Fotocamera non disponibile', 'Controlla i permessi del browser');
      }
    }

    startCamera();
  </script>
</body>

</html>
