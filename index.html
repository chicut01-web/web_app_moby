<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presenze Volontari</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-light: #f8fafc;
      --surface: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --moby-blue: #3b7f9e;
      --moby-green: #10b981;
      --moby-red: #ef4444;
      --border-light: rgba(0, 0, 0, 0.06);
      --radius-card: 20px;
      --radius-btn: 12px;
    }

    body {
      background: var(--bg-light);
      color: var(--text-primary);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 20px 80px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 8px;
    }

    .logo-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .logo-tag {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      font-weight: 700;
      font-size: clamp(1.6rem, 7vw, 2.4rem);
      color: var(--text-primary);
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-top: 2px;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--moby-green);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
      animation: pulse-green 2.5s ease-in-out infinite;
    }

    @keyframes pulse-green {

      0%,
      100% {
        box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
      }

      50% {
        box-shadow: 0 0 0 6px rgba(16, 185, 129, 0.08);
      }
    }

    /* TIME */
    .time-display {
      text-align: center;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-card);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
    }

    .time {
      font-size: 42px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
      letter-spacing: -2px;
    }

    .date {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-top: 6px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-card);
      padding: 18px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.03);
    }

    .stat-num {
      font-weight: 700;
      font-size: clamp(2rem, 8vw, 2.4rem);
      line-height: 1;
      color: var(--text-primary);
    }

    .stat-card.entrate .stat-num {
      color: var(--moby-green);
    }

    .stat-card.uscite .stat-num {
      color: var(--moby-blue);
    }

    .stat-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-top: 6px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* SCANNER */
    .scanner-card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-card);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
      overflow: hidden;
    }

    .scanner-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-light);
    }

    .scanner-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .scan-indicator {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--moby-green);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .scan-indicator::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--moby-green);
      animation: pulse-green 2s ease-in-out infinite;
    }

    .video-wrap {
      position: relative;
      aspect-ratio: 1 / 1;
      background: #0f172a;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    canvas {
      display: none;
    }

    /* Scanner overlay */
    .scan-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .scan-frame {
      width: 65%;
      aspect-ratio: 1;
      position: relative;
    }

    .scan-frame::before,
    .scan-frame::after,
    .scan-frame span::before,
    .scan-frame span::after {
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: #ffffff;
      border-style: solid;
      opacity: 0.85;
    }

    .scan-frame::before {
      top: 0;
      left: 0;
      border-width: 2px 0 0 2px;
    }

    .scan-frame::after {
      top: 0;
      right: 0;
      border-width: 2px 2px 0 0;
    }

    .scan-frame span::before {
      bottom: 0;
      left: 0;
      border-width: 0 0 2px 2px;
    }

    .scan-frame span::after {
      bottom: 0;
      right: 0;
      border-width: 0 2px 2px 0;
    }

    .scan-line {
      position: absolute;
      left: 10%;
      right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--moby-green), transparent);
      box-shadow: 0 0 12px rgba(16, 185, 129, 0.8);
      animation: wave-scan 2.8s ease-in-out infinite;
      top: 0;
    }

    @keyframes wave-scan {
      0% {
        top: 5%;
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        top: 95%;
        opacity: 0;
      }
    }

    /* TIPO SWITCH */
    .tipo-switch {
      display: flex;
      gap: 10px;
      padding: 14px 16px;
      border-top: 1px solid var(--border-light);
    }

    .tipo-btn {
      flex: 1;
      padding: 12px;
      background: var(--bg-light);
      border: 1.5px solid var(--border-light);
      color: var(--text-secondary);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: all 0.2s ease;
      border-radius: var(--radius-btn);
    }

    .tipo-btn:hover {
      background: #f1f5f9;
      border-color: #94a3b8;
    }

    .tipo-btn.active-entrata {
      border-color: var(--moby-green);
      color: var(--moby-green);
      background: #f0fdf4;
    }

    .tipo-btn.active-uscita {
      border-color: var(--moby-red);
      color: var(--moby-red);
      background: #fef2f2;
    }

    /* FEEDBACK */
    .feedback {
      padding: 16px 20px;
      border-radius: var(--radius-card);
      font-weight: 600;
      font-size: 14px;
      display: none;
      align-items: center;
      gap: 12px;
      animation: slideIn 0.3s ease;
    }

    .feedback.show {
      display: flex;
    }

    .feedback.success {
      background: #f0fdf4;
      border: 1.5px solid rgba(16, 185, 129, 0.3);
      color: #15803d;
    }

    .feedback.error {
      background: #fef2f2;
      border: 1.5px solid rgba(239, 68, 68, 0.3);
      color: #b91c1c;
    }

    .feedback.loading {
      background: #eff6ff;
      border: 1.5px solid rgba(59, 127, 158, 0.3);
      color: var(--moby-blue);
    }

    .feedback-icon {
      font-size: 20px;
      flex-shrink: 0;
    }

    .feedback-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .feedback-name {
      font-size: 15px;
      font-weight: 700;
    }

    .feedback-sub {
      font-size: 11px;
      opacity: 0.7;
    }

    @keyframes slideIn {
      from {
        transform: translateY(12px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* LOG */
    .log-section {
      margin-top: 4px;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-secondary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-light);
    }

    .log-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .log-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
      animation: slideIn 0.3s ease;
    }

    .log-info {
      display: contents;
    }

    .log-nome {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
    }

    .log-meta {
      font-size: 0.72rem;
      color: var(--text-secondary);
      flex-shrink: 0;
      min-width: 52px;
    }

    .log-tipo {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 6px;
    }

    .log-tipo.entrata {
      background: #dcfce7;
      color: #15803d;
    }

    .log-tipo.uscita {
      background: #e0f2fe;
      color: var(--moby-blue);
    }

    .log-empty {
      text-align: center;
      padding: 32px;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
  </style>
</head>


<main>
  <header>
    <div class="logo-group">
      <img src="logo/logo_mobydickets-1-3.png" alt="Moby Dick ETS"
        style="height: 60px; object-fit: contain; margin-bottom: 8px;">
      <span class="logo-tag">Servizio Civile</span>
      <h1>Presenze</h1>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </header>

  <div class="time-display">
    <div class="time" id="clock">00:00:00</div>
    <div class="date" id="dateLabel">—</div>
  </div>

  <div class="stats-row">
    <div class="stat-card entrate">
      <div class="stat-num" id="statEntrate">0</div>
      <div class="stat-label">Entrate oggi</div>
    </div>
    <div class="stat-card uscite">
      <div class="stat-num" id="statUscite">0</div>
      <div class="stat-label">Uscite oggi</div>
    </div>
  </div>

  <div class="scanner-card">
    <div class="scanner-header">
      <span class="scanner-title">Scanner QR</span>
      <span class="scan-indicator" id="scanIndicator">IN ATTESA</span>
    </div>
    <div class="video-wrap">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="canvas"></canvas>
      <div class="scan-overlay">
        <div class="scan-frame">
          <span></span>
          <div class="scan-line"></div>
        </div>
      </div>
    </div>
    <div class="tipo-switch">
      <button class="tipo-btn active-entrata" id="btnEntrata" onclick="setTipo('entrata')">⬆️ Entrata</button>
      <button class="tipo-btn" id="btnUscita" onclick="setTipo('uscita')">⬇️ Uscita</button>
    </div>
  </div>

  <div class="feedback" id="feedback">
    <div class="feedback-icon" id="feedbackIcon">✓</div>
    <div class="feedback-text">
      <div class="feedback-name" id="feedbackName">—</div>
      <div class="feedback-sub" id="feedbackSub">—</div>
    </div>
  </div>

  <div class="log-section">
    <div class="section-label">Log di oggi</div>
    <div class="log-list" id="logList">
      <div class="log-empty">Nessuna scansione ancora</div>
    </div>
  </div>
</main>

<script>
  // ─── CONFIG ────────────────────────────────────────────────────────────────
  const SUPABASE_URL = 'https://czsbkfbtjlrbugmggzpn.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6c2JrZmJ0amxyYnVnbWdnenBuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MTY4MzEsImV4cCI6MjA4ODE5MjgzMX0.bAl9rSpvN2eAGSUhyBYg4aKvgnwPwrLP8fDiUkQ1grM';

  // ─── INIT ──────────────────────────────────────────────────────────────────
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  let tipoCorrente = 'entrata';
  let ultimoScan = null;
  let cooldown = false;
  const LOG_TODAY = [];

  // ─── CLOCK ─────────────────────────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT');
    document.getElementById('dateLabel').textContent = now.toLocaleDateString('it-IT', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ─── TIPO ──────────────────────────────────────────────────────────────────
  function setTipo(tipo) {
    tipoCorrente = tipo;
    document.getElementById('btnEntrata').className = 'tipo-btn' + (tipo === 'entrata' ? ' active-entrata' : '');
    document.getElementById('btnUscita').className = 'tipo-btn' + (tipo === 'uscita' ? ' active-uscita' : '');
  }

  // ─── FEEDBACK ──────────────────────────────────────────────────────────────
  function showFeedback(type, icon, name, sub) {
    const el = document.getElementById('feedback');
    el.className = 'feedback show ' + type;
    document.getElementById('feedbackIcon').textContent = icon;
    document.getElementById('feedbackName').textContent = name;
    document.getElementById('feedbackSub').textContent = sub;
    setTimeout(() => el.classList.remove('show'), 4000);
  }

  // ─── STATS ─────────────────────────────────────────────────────────────────
  function updateStats() {
    const entrate = LOG_TODAY.filter(l => l.tipo === 'entrata').length;
    const uscite = LOG_TODAY.filter(l => l.tipo === 'uscita').length;
    document.getElementById('statEntrate').textContent = entrate;
    document.getElementById('statUscite').textContent = uscite;
  }

  // ─── LOG ───────────────────────────────────────────────────────────────────
  function addLogItem(nome, tipo, ts) {
    LOG_TODAY.unshift({ nome, tipo, ts });
    const list = document.getElementById('logList');
    list.innerHTML = '';
    LOG_TODAY.slice(0, 12).forEach(entry => {
      const t = new Date(entry.ts).toLocaleTimeString('it-IT');
      list.insertAdjacentHTML('beforeend', `
        <div class="log-item">
          <div class="log-badge ${entry.tipo}"></div>
          <div class="log-info">
            <div class="log-nome">${entry.nome}</div>
            <div class="log-meta">${t}</div>
          </div>
          <div class="log-tipo ${entry.tipo}">${entry.tipo}</div>
        </div>
      `);
    });
    updateStats();
  }

  // ─── QR SCAN ───────────────────────────────────────────────────────────────
  async function onQRDetected(code) {
    if (cooldown || code === ultimoScan) return;
    cooldown = true;
    ultimoScan = code;

    document.getElementById('scanIndicator').textContent = 'ELABORO...';
    showFeedback('loading', '⟳', 'Elaborazione...', code);

    try {
      // Cerca volontario per codice_qr
      const { data: vol, error: ve } = await db
        .from('volontari')
        .select('*')
        .eq('codice_qr', code)
        .single();

      if (ve || !vol) {
        showFeedback('error', '✗', 'QR non riconosciuto', code);
        document.getElementById('scanIndicator').textContent = 'ERRORE';
      } else {
        const ts = new Date().toISOString();
        const nome = `${vol.nome} ${vol.cognome}`;

        await db.from('presenze').insert({
          volontario_id: vol.id,
          tipo: tipoCorrente,
          timestamp: ts
        });

        const emoji = tipoCorrente === 'entrata' ? '✓' : '✗';
        showFeedback('success', emoji, nome,
          `${tipoCorrente.toUpperCase()} registrata · ${new Date(ts).toLocaleTimeString('it-IT')}`);

        addLogItem(nome, tipoCorrente, ts);
        document.getElementById('scanIndicator').textContent = 'SCANSIONE OK';
      }
    } catch (err) {
      showFeedback('error', '!', 'Errore di rete', err.message);
      document.getElementById('scanIndicator').textContent = 'ERRORE';
    }

    setTimeout(() => {
      cooldown = false;
      ultimoScan = null;
      document.getElementById('scanIndicator').textContent = 'ATTIVO';
    }, 3000);
  }

  // ─── CAMERA ────────────────────────────────────────────────────────────────
  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 } }
      });
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      video.srcObject = stream;

      video.addEventListener('loadedmetadata', () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        document.getElementById('scanIndicator').textContent = 'ATTIVO';

        function tick() {
          if (video.readyState === video.HAVE_ENOUGH_DATA) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imgData.data, imgData.width, imgData.height, {
              inversionAttempts: 'dontInvert'
            });
            if (code) onQRDetected(code.data);
          }
          requestAnimationFrame(tick);
        }
        tick();
      });
    } catch (err) {
      document.getElementById('scanIndicator').textContent = 'CAM NEGATA';
      showFeedback('error', '!', 'Fotocamera non disponibile', 'Controlla i permessi del browser');
    }
  }

  startCamera();
</script>
</body>

</html>
