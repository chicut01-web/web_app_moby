<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Moby Dick Dashboard - Sculptural Glass</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#4A8EAA",
                        secondary: "#DCEBF2",
                        accent: "#F39C12",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                },
            },
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style>
        @layer base {
            body {
                @apply text-slate-900 font-display overflow-x-hidden;
                -webkit-tap-highlight-color: transparent;
                background: 
                    radial-gradient(at 0% 0%, #DCEBF2 0px, transparent 50%),
                    radial-gradient(at 100% 0%, #4A8EAA22 0px, transparent 50%),
                    radial-gradient(at 100% 100%, #DCEBF2 0px, transparent 50%),
                    radial-gradient(at 0% 100%, #4A8EAA11 0px, transparent 50%),
                    #f8fafc;
                background-attachment: fixed;
            }
        }
        .liquid-glass {
            @apply backdrop-blur-2xl border border-white/40 shadow-[0_8px_32px_0_rgba(31,38,135,0.08)];
        }
        .shard-1 {
            border-radius: 60% 40% 70% 30% / 40% 50% 60% 70%;
        }
        .shard-2 {
            border-radius: 30% 70% 40% 60% / 60% 30% 70% 40%;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }
        @keyframes float-slow {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-15px) translateX(5px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        .animate-float-slow {
            animation: float-slow 8s ease-in-out infinite;
        }
        .glass-gradient-bg {
            background: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.2) 100%);
        }
        .glass-gradient-primary {
            background: linear-gradient(135deg, rgba(74, 142, 170, 0.8) 0%, rgba(74, 142, 170, 0.4) 100%);
        }
        .mesh-blob {
            position: fixed;
            width: 500px;
            height: 500px;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.5;
        }@keyframes morph-breath {
            0% { border-radius: 3rem; }
            33% { border-radius: 3.2rem 2.8rem 3.1rem 2.9rem; }
            66% { border-radius: 2.8rem 3.2rem 2.9rem 3.1rem; }
            100% { border-radius: 3rem; }
        }
        @keyframes liquid-shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .liquid-interactive-btn {
            animation: morph-breath 8s ease-in-out infinite;
            background: linear-gradient(90deg, 
                rgba(74, 142, 170, 0.9) 0%, 
                rgba(95, 160, 185, 0.9) 25%, 
                rgba(120, 180, 205, 0.8) 50%, 
                rgba(95, 160, 185, 0.9) 75%, 
                rgba(74, 142, 170, 0.9) 100%
            );
            background-size: 200% 100%;
            animation: morph-breath 8s ease-in-out infinite, liquid-shimmer 6s linear infinite;
        }
    </style>
    <style>
        body {
            min-height: 100dvh;
        }

        @keyframes reveal-up {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes glow-pulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(74, 142, 170, 0.4);
            }

            50% {
                box-shadow: 0 0 30px 10px rgba(74, 142, 170, 0.2);
            }
        }

        .reveal-animate {
            animation: reveal-up 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
        }

        .glow-effect {
            animation: glow-pulse 3s infinite;
        }

        .hover-scale:active {
            transform: scale(0.95);
            transition: transform 0.2s;
        }

        .hover-scale:hover {
            transform: translateY(-4px);
        }

        @keyframes draw-check {
            to {
                stroke-dashoffset: 0;
            }
        }

        @keyframes success-pop {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            70% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .success-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(220, 235, 242, 0.6);
            backdrop-filter: blur(20px);
            align-items: center;
            justify-content: center;
        }

        .success-card {
            animation: success-pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            background: white;
            border-radius: 3rem;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .check-draw {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: draw-check 0.8s ease-out forwards 0.3s;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">
    <div class="mesh-blob bg-primary/30 top-[10%] right-[10%] animate-float-slow"
        style="width: 600px; height: 600px; animation-duration: 12s;"></div>
    <div class="mesh-blob bg-secondary/40 bottom-[20%] left-[-10%] animate-float"

    <div class="mesh-blob bg-primary/20 top-[-100px] left-[-100px] animate-float-slow"></div>
    <div class="mesh-blob bg-accent/10 bottom-[-100px] right-[-100px] animate-float" style="animation-delay: -2s"></div>
    <div class="mesh-blob bg-secondary top-[40%] left-[20%] opacity-30"></div>

                    class="text-primary/80">Real-time</span></h1>
        </div>

            <div
                class="absolute top-0 left-0 w-[58%] h-[140px] liquid-glass glass-gradient-bg shard-1 animate-float flex flex-col items-center justify-center p-6 z-20">
                <div class="w-9 h-9 rounded-full bg-primary/10 flex items-center justify-center mb-1">
                    <span class="material-symbols-outlined text-primary text-xl">qr_code_scanner</span>
                </div>
                <span class="text-4xl font-black text-slate-800 leading-none">142</span>
                <span class="text-[8px] font-bold text-slate-500 mt-2 uppercase tracking-widest">Scansioni</span>

            <div class="absolute top-8 right-0 w-[53%] h-[130px] liquid-glass bg-white/30 shard-2 animate-float-slow flex flex-col items-center justify-center p-6 z-10"

                </div>
                <span class="text-3xl font-black text-slate-800 leading-none">4</span>
                <span class="text-[8px] font-bold text-slate-500 mt-2 uppercase tracking-widest">In Sede</span>
            </div>
        </div>
        <div class="space-y-4">
            <h2 class="text-[10px] font-black text-primary/60 uppercase tracking-[0.3em] pl-2">Azioni Rapide</h2>
            <div class="relative space-y-3">
                <button
                    class="w-full liquid-glass liquid-interactive-btn text-white p-5 flex items-center space-x-5 active:scale-95 transition-all relative overflow-hidden group glow-effect cursor-pointer"
                    onclick="const overlay = document.getElementById('success-animation'); overlay.style.display = 'flex'; setTimeout(() => { overlay.style.opacity = '0'; overlay.style.transition = 'opacity 0.5s'; setTimeout(() => { overlay.style.display = 'none'; overlay.style.opacity = '1'; }, 500); }, 3000);">
                    <div
                        class="absolute inset-0 bg-gradient-to-tr from-white/10 via-white/5 to-transparent pointer-events-none">
                    </div>
                    <div
                        class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-[1500ms]">
                    </div>
                    <div
                        class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center flex-shrink-0 backdrop-blur-md border border-white/30 shadow-inner">

                    </div>
                    <div class="text-left relative z-10">
                        <p class="font-black text-lg leading-tight tracking-tight">Registra Presenza</p>
                        <p class="text-white/80 text-[10px] font-bold uppercase tracking-[0.15em]">Nuovo partecipante
                        </p>
                    </div>
                    <div class="ml-auto pr-2 relative z-10">
                        <span
                            class="material-symbols-outlined text-xl opacity-60 group-hover:translate-x-1 transition-transform">arrow_forward_ios</span>

                    <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center flex-shrink-0">
                        <span class="material-symbols-outlined text-primary text-2xl">analytics</span>
                    </div>
                    <div class="text-left">
                        <p class="font-extrabold text-lg leading-tight text-slate-800">Invia Report</p>
                        <p class="text-slate-500 text-[10px] font-medium uppercase tracking-wider">Esporta CSV/PDF</p>
                    </div>
                    <div class="ml-auto pr-2">
                        <span class="material-symbols-outlined text-slate-300 text-xl">chevron_right</span>
                    </div>
                </button>
            </div>
        </div>

            <div class="relative -top-8">

            <button class="flex flex-col items-center text-slate-400 group">
                <span
                    class="material-symbols-outlined text-[24px] transition-transform group-active:scale-75">group</span>
                <span class="text-[9px] font-bold mt-0.5 uppercase tracking-tighter">Staff</span>
            </button>
            <button class="flex flex-col items-center text-slate-400 group">
                <span
                    class="material-symbols-outlined text-[24px] transition-transform group-active:scale-75">settings</span>
                <span class="text-[9px] font-bold mt-0.5 uppercase tracking-tighter">Menu</span>
            </button>
        </div>
    </nav>
    <div class="success-overlay" id="success-animation">
        <div class="success-card liquid-glass animate-float">
            <div class="relative mb-6">
                <div class="absolute inset-0 bg-green-400/20 rounded-full blur-2xl glow-effect"></div>
                <svg class="w-24 h-24 text-green-500 relative z-10" fill="none" stroke="currentColor" stroke-width="3"

                    <path class="check-draw" d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </div>
            <h2 class="text-3xl font-black text-slate-800 tracking-tight mb-2">Successo!</h2>
            <p class="text-slate-500 font-bold uppercase text-[10px] tracking-widest">Presenza Registrata</p>
            <div class="absolute -top-4 -right-4 w-12 h-12 bg-primary/20 rounded-full blur-xl"></div>
            <div class="absolute -bottom-4 -left-4 w-16 h-16 bg-accent/20 rounded-full blur-xl"></div>
        </div>
